apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: catalog-networkpolicy
  namespace: default
spec:
  podSelector:
    matchLabels:
      service: catalog
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: user
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8081
  - from:
    - podSelector:
        matchLabels:
          app: kibana
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8081